{% extends 'base.html' %}
{% block content %}
<section class="container mx-auto max-w-5xl px-4 py-16">
<h1 class="font-display text-4xl mb-6 text-brand-600 dark:text-brand-400">تواصل معي</h1>
<div id="contact-box">
{% if sent %}{% include 'partials/contact_thanks.html' %}{% else %}
<form hx-post="/contact" hx-target="#contact-box" hx-swap="innerHTML" class="grid gap-4 max-w-2xl">
<input name="name" required minlength="2" maxlength="150" placeholder="الاسم" class="px-4 py-3 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200">
<input name="email" type="email" required maxlength="255" placeholder="البريد الإلكتروني" class="px-4 py-3 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200">
<input name="subject" required minlength="2" maxlength="255" placeholder="الموضوع" class="px-4 py-3 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200">
<textarea name="body" required minlength="5" maxlength="5000" rows="6" placeholder="رسالتك" class="px-4 py-3 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200"></textarea>
<button class="px-6 py-3 rounded-lg bg-brand-500 hover:bg-brand-600 text-white font-bold w-fit transition-colors">إرسال</button>
</form>
{% endif %}
</div></section>{% endblock %}
