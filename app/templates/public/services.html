{% extends 'base.html' %}
{% block content %}
<section class="container mx-auto max-w-5xl px-4 py-16">
<h1 class="font-display text-4xl mb-8 text-brand-600 dark:text-brand-400">{{ t('nav.services') }}</h1>
<div class="grid md:grid-cols-2 gap-5">
{% for s in items %}
<a href="/services/{{ s.slug }}" class="p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-brand-400 shadow-card group transition-colors">
<h3 class="font-display text-lg text-slate-900 dark:text-white group-hover:text-brand-500">{{ s.title }}</h3>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-2">{{ s.short_description }}</p></a>
{% endfor %}</div></section>{% endblock %}
