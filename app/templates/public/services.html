{% extends 'base.html' %}
{% block content %}
<section class="container mx-auto max-w-5xl px-4 py-16">
<h1 class="font-display text-4xl mb-8 text-gold-400">الخدمات</h1>
<div class="grid md:grid-cols-2 gap-5">
{% for s in items %}
<a href="/services/{{ s.slug }}" class="p-6 rounded-2xl bg-ink-700 border border-white/5 hover:border-gold-500/40 group">
<h3 class="font-display text-lg group-hover:text-gold-400">{{ s.title }}</h3>
<p class="text-sm text-neutral-400 mt-2">{{ s.short_description }}</p></a>
{% endfor %}</div></section>{% endblock %}
