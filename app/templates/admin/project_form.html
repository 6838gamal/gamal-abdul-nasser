{% extends 'admin/_layout.html' %}{% block heading %}{{ p.title if p else 'مشروع جديد' }}{% endblock %}{% block content %}
<form method="post" action="/admin/projects/save" enctype="multipart/form-data" class="grid lg:grid-cols-3 gap-5">
<input type="hidden" name="pid" value="{{ p.id if p else 0 }}">
<div class="lg:col-span-2 space-y-4">
<input name="title" required value="{{ p.title if p else '' }}" placeholder="العنوان" class="w-full px-4 py-3 rounded-lg bg-ink-700 border border-white/10 text-lg">
<textarea name="short_description" required rows="2" placeholder="وصف مختصر" class="w-full px-4 py-3 rounded-lg bg-ink-700 border border-white/10">{{ p.short_description if p else '' }}</textarea>
<textarea name="description" required rows="14" placeholder="وصف تفصيلي (HTML)" class="w-full px-4 py-3 rounded-lg bg-ink-700 border border-white/10">{{ p.description if p else '' }}</textarea>
<input name="github_url" placeholder="GitHub URL" value="{{ p.github_url if p else '' }}" class="w-full px-4 py-2 rounded-lg bg-ink-700 border border-white/10">
<input name="live_url" placeholder="Live URL" value="{{ p.live_url if p else '' }}" class="w-full px-4 py-2 rounded-lg bg-ink-700 border border-white/10">
<input name="video_url" placeholder="Video URL" value="{{ p.video_url if p else '' }}" class="w-full px-4 py-2 rounded-lg bg-ink-700 border border-white/10">
<input name="technologies" placeholder="التقنيات (مفصولة بفاصلة)" value="{{ p.technologies|join(', ') if p else '' }}" class="w-full px-4 py-2 rounded-lg bg-ink-700 border border-white/10">
<input name="tags" placeholder="وسوم" value="{{ p.tags|join(', ') if p else '' }}" class="w-full px-4 py-2 rounded-lg bg-ink-700 border border-white/10">
</div>
<aside class="space-y-3 p-4 rounded-2xl bg-ink-700 border border-white/5 h-fit">
<label class="flex items-center gap-2"><input type="checkbox" name="is_published" value="true" {% if p and p.is_published %}checked{% endif %}> نشر</label>
<label class="flex items-center gap-2"><input type="checkbox" name="featured" value="true" {% if p and p.featured %}checked{% endif %}> مميّز</label>
<input name="cover" type="file" accept="image/*" class="w-full text-sm">
{% if p and p.cover_image %}<img src="{{ p.cover_image }}" class="rounded-lg">{% endif %}
<button class="w-full px-4 py-3 rounded-lg bg-gold-500 text-ink-900 font-bold">حفظ</button>
</aside></form>{% endblock %}
