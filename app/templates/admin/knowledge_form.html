{% extends 'admin/_layout.html' %}{% block heading %}{{ k.title if k else 'معرفة جديدة' }}{% endblock %}{% block content %}
<form method="post" action="/admin/knowledge/save" class="grid lg:grid-cols-3 gap-5">
<input type="hidden" name="kid" value="{{ k.id if k else 0 }}">
<div class="lg:col-span-2 space-y-4">
<input name="title" required value="{{ k.title if k else '' }}" placeholder="عنوان المعرفة (مثال: أسعار الخدمات، ساعات العمل...)" class="w-full px-4 py-3 rounded-lg bg-ink-700 border border-white/10 text-lg">
<textarea name="content" required rows="14" placeholder="اكتب هنا المعلومات التي تريد أن يعرفها الوكيل الذكي عند الرد على الزوار..." class="w-full px-4 py-3 rounded-lg bg-ink-700 border border-white/10">{{ k.content if k else '' }}</textarea>
</div>
<aside class="space-y-3 p-4 rounded-2xl bg-ink-700 border border-white/5 h-fit">
<label class="flex items-center gap-2"><input type="checkbox" name="is_active" value="true" {% if not k or k.is_active %}checked{% endif %}> تفعيل (استخدامها من قبل الوكيل)</label>
<p class="text-xs text-neutral-500 leading-relaxed">عند التفعيل، سيتم تزويد الوكيل الذكي بهذا المحتوى كسياق إضافي عند الرد على أسئلة الزوار في الشات.</p>
<button class="w-full px-4 py-3 rounded-lg bg-gold-500 text-ink-900 font-bold">حفظ</button>
</aside></form>{% endblock %}
