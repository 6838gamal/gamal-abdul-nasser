<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><title>دخول</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head><body class="bg-[#0a0a0a] text-white min-h-screen grid place-items-center font-['Tajawal']">
<form method="post" class="bg-[#141414] border border-white/5 rounded-2xl p-8 w-full max-w-sm space-y-4">
<h1 class="text-2xl font-bold text-center text-[#c9a84c]">دخول المدير</h1>
{% if error %}<p class="text-red-400 text-sm text-center">{{ error }}</p>{% endif %}
<input name="email" type="email" required placeholder="البريد" class="w-full px-4 py-3 rounded-lg bg-black/40 border border-white/10">
<input name="password" type="password" required placeholder="كلمة المرور" class="w-full px-4 py-3 rounded-lg bg-black/40 border border-white/10">
<button class="w-full px-4 py-3 rounded-lg bg-[#c9a84c] text-black font-bold">دخول</button>
</form></body></html>
