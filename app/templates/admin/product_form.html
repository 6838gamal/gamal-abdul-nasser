{% extends 'admin/_layout.html' %}{% block heading %}{{ p.title if p else 'منتج جديد' }}{% endblock %}{% block content %}
<form method="post" action="/admin/products/save" enctype="multipart/form-data" class="grid lg:grid-cols-3 gap-5">
<input type="hidden" name="pid" value="{{ p.id if p else 0 }}">
<div class="lg:col-span-2 space-y-4">
<input name="title" required value="{{ p.title if p else '' }}" placeholder="اسم المنتج" class="w-full px-4 py-3 rounded-lg bg-ink-700 border border-white/10 text-lg">
<textarea name="short_description" required rows="2" placeholder="وصف مختصر" class="w-full px-4 py-3 rounded-lg bg-ink-700 border border-white/10">{{ p.short_description if p else '' }}</textarea>
<textarea name="description" required rows="12" placeholder="وصف تفصيلي" class="w-full px-4 py-3 rounded-lg bg-ink-700 border border-white/10">{{ p.description if p else '' }}</textarea>
</div>
<aside class="space-y-3 p-4 rounded-2xl bg-ink-700 border border-white/5 h-fit">
<label class="flex items-center gap-2"><input type="checkbox" name="is_published" value="true" {% if p and p.is_published %}checked{% endif %}> نشر</label>
<div class="grid grid-cols-2 gap-2"><input name="price" type="number" step="0.01" value="{{ p.price if p else 0 }}" placeholder="السعر" class="px-3 py-2 rounded-lg bg-ink-800 border border-white/10"><input name="currency" value="{{ p.currency if p else 'USD' }}" class="px-3 py-2 rounded-lg bg-ink-800 border border-white/10"></div>
<label class="block text-sm">صورة الغلاف</label><input name="cover" type="file" accept="image/*" class="w-full text-sm">
<label class="block text-sm">ملف المنتج (للتحميل)</label><input name="product_file" type="file" class="w-full text-sm">
<button class="w-full px-4 py-3 rounded-lg bg-gold-500 text-ink-900 font-bold">حفظ</button>
</aside></form>{% endblock %}
