upstream app_upstream { server app:8000; keepalive 32; }

server {
  listen 80 default_server;
  server_name _;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location /static/ { alias /var/www/static/; expires 30d; access_log off; add_header Cache-Control "public, max-age=2592000, immutable"; }
  location /uploads/ { alias /var/www/uploads/; expires 30d; access_log off; }

  location / {
    proxy_pass http://app_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }
}
